version: '3.8'

# Production compose — uses an EXTERNAL PostgreSQL container.
# Before running:
#   1. docker network create intellisense-net
#   2. docker network connect intellisense-net <seu-container-postgres>
#   3. cp .env.production .env.prod.local  →  preencha os valores reais
#   4. docker compose -f docker-compose.prod.yml --env-file .env.prod.local up -d --build

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server.prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
    networks:
      - intellisense-net
    depends_on: []   # PostgreSQL is external; remove db dependency
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  client:
    build:
      context: .
      dockerfile: Dockerfile.client.prod
    restart: unless-stopped
    ports:
      - "80:80"       # HTTP — configure SSL via reverse proxy (Nginx/Caddy) na VPS
    networks:
      - intellisense-net
    depends_on:
      server:
        condition: service_healthy

networks:
  intellisense-net:
    external: true   # rede já criada manualmente; compartilhada com o container Postgres
